services:
  app:
    build: .
    ports:
      - "${PORT:-8787}:8787"
    environment:
      PORT: 8787
      WEB_DIR: ./web/dist
      STORE_DRIVER: mongo
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-workflow}
      VAULT_DRIVER: s3
      S3_BUCKET: ${S3_BUCKET:-workflow-secrets}
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio12345}
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    volumes:
      - minio-data:/data
    restart: unless-stopped

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio12345}; do echo 'waiting for minio'; sleep 1; done;
      mc mb --ignore-existing local/${S3_BUCKET:-workflow-secrets};
      "

volumes:
  mongo-data:
  minio-data:
