name: Deploy Workflow Builder

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy
        env:
          GARAGE_KEY_ID: ${{ secrets.GARAGE_KEY_ID }}
          GARAGE_KEY_SECRET: ${{ secrets.GARAGE_KEY_SECRET }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          CODE_RUNTIME: ${{ secrets.CODE_RUNTIME }}
          CODE_EXEC_URL: ${{ secrets.CODE_EXEC_URL }}
          CODE_EXEC_TOKEN: ${{ secrets.CODE_EXEC_TOKEN }}
          CODE_TIMEOUT_SEC: ${{ secrets.CODE_TIMEOUT_SEC }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: |
          set -a
          [ -f /opt/workflow-builder/.env ] && . /opt/workflow-builder/.env
          set +a
          cp /opt/workflow-builder/docker-compose.yml docker-compose.prod.yml
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Prune dangling images
        run: docker image prune -f

      - name: Summary
        run: docker ps --filter name=workflow-builder --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
